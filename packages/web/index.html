<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git Galaxy</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌌</text></svg>"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #02020a;
      }
      #scene {
        display: block;
        width: 100%;
        height: 100%;
      }
      #hud {
        position: fixed;
        top: 16px;
        left: 20px;
        color: rgba(220, 228, 255, 0.85);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 13px;
        line-height: 1.6;
        text-shadow: 0 0 8px rgba(0, 0, 20, 0.9);
        pointer-events: none;
        user-select: none;
      }
      #hud .title {
        font-size: 16px;
        letter-spacing: 0.08em;
      }
      #hud .dim {
        color: rgba(160, 170, 210, 0.6);
      }
      #controls {
        position: fixed;
        bottom: 16px;
        left: 20px;
        display: flex;
        gap: 8px;
      }
      #controls button {
        background: rgba(18, 24, 46, 0.72);
        color: rgba(210, 220, 250, 0.9);
        border: 1px solid rgba(150, 165, 220, 0.25);
        border-radius: 6px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 12px;
        padding: 6px 12px;
        cursor: pointer;
      }
      #controls button:hover {
        background: rgba(35, 45, 80, 0.85);
      }
      #tooltip {
        position: fixed;
        display: none;
        pointer-events: none;
        z-index: 10;
        max-width: 360px;
        background: rgba(8, 10, 22, 0.92);
        border: 1px solid rgba(150, 165, 220, 0.3);
        border-radius: 6px;
        padding: 8px 11px;
        color: #dce4ff;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 12px;
        line-height: 1.55;
      }
      #tooltip .dim {
        color: rgba(160, 170, 210, 0.7);
      }
      #timeline {
        position: fixed;
        bottom: 16px;
        right: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(18, 24, 46, 0.72);
        border: 1px solid rgba(150, 165, 220, 0.25);
        border-radius: 6px;
        padding: 6px 12px;
      }
      #timeline button {
        background: none;
        border: none;
        color: rgba(210, 220, 250, 0.9);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 12px;
        cursor: pointer;
        padding: 0;
        white-space: nowrap;
      }
      #timeline input[type="range"] {
        width: 220px;
        accent-color: #8fa8e8;
      }
      #timeline .date {
        color: rgba(160, 170, 210, 0.8);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 12px;
        min-width: 84px;
      }
      #scanner {
        position: fixed;
        bottom: 64px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        max-width: 420px;
        background: rgba(8, 14, 26, 0.88);
        border: 1px solid rgba(120, 200, 255, 0.4);
        border-radius: 6px;
        padding: 8px 12px;
        color: #cfe8ff;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 12px;
        line-height: 1.55;
        text-align: center;
      }
      #scanner .dim {
        color: rgba(140, 180, 220, 0.7);
      }
      #scanner .scanlabel {
        color: rgba(120, 200, 255, 0.75);
        letter-spacing: 0.2em;
        font-size: 10px;
      }
      #scene {
        touch-action: none; /* OrbitControls owns all touch gestures */
      }
      /* Flight throttle: a plain horizontal bar in the stacked bottom zones —
         the rotated-vertical version could land partly off-screen. */
      #throttle {
        display: none;
        position: fixed;
        left: 16px;
        right: 16px;
        bottom: 150px;
        height: 32px;
        accent-color: #8fc4ff;
        touch-action: none;
        z-index: 5;
      }
      #landing {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 20;
        background: radial-gradient(ellipse at center, #0a0e22 0%, #02020a 70%);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        padding: 16px;
      }
      #landing .card {
        max-width: 460px;
        width: 100%;
        color: #dce4ff;
      }
      #landing h1 {
        font-size: 26px;
        letter-spacing: 0.06em;
        margin: 0 0 10px;
      }
      #landing p {
        color: rgba(170, 182, 220, 0.85);
        font-size: 13px;
        line-height: 1.6;
        margin: 0 0 18px;
      }
      #landing form {
        display: flex;
        gap: 8px;
      }
      #landing input {
        flex: 1;
        min-width: 0;
        background: rgba(18, 24, 46, 0.85);
        border: 1px solid rgba(150, 165, 220, 0.35);
        border-radius: 6px;
        color: #dce4ff;
        font: inherit;
        font-size: 15px;
        padding: 12px;
      }
      #landing button {
        background: rgba(70, 95, 180, 0.55);
        border: 1px solid rgba(150, 165, 220, 0.45);
        border-radius: 6px;
        color: #eaf0ff;
        font: inherit;
        font-size: 14px;
        padding: 12px 16px;
        cursor: pointer;
      }
      #landing .examples {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }
      #landing .examples button {
        background: rgba(18, 24, 46, 0.85);
        font-size: 12px;
        padding: 8px 10px;
        color: rgba(190, 200, 240, 0.9);
      }
      #landing details {
        margin-top: 16px;
        font-size: 12px;
        color: rgba(160, 170, 210, 0.75);
      }
      #landing details input {
        width: 100%;
        margin-top: 8px;
        font-size: 13px;
        box-sizing: border-box;
      }
      #landing .status {
        margin-top: 14px;
        min-height: 18px;
        font-size: 13px;
        color: #9fc8ff;
      }
      #landing .status.error {
        color: #ff9f9f;
      }
      /* Small screens: tighten the control rows, stack the timeline above them. */
      @media (max-width: 760px) {
        #hud {
          left: 12px;
          top: 10px;
          font-size: 11px;
        }
        #hud .title {
          font-size: 14px;
        }
        /* Stacked zones, bottom-up: timeline, controls, scanner — no overlap
           even when the control row wraps to two lines. */
        #timeline {
          left: 12px;
          right: 12px;
          bottom: 12px;
          justify-content: space-between;
        }
        #timeline input[type="range"] {
          width: auto;
          flex: 1;
        }
        #controls {
          left: 12px;
          right: 12px;
          bottom: 62px;
          flex-wrap: wrap;
          gap: 6px;
        }
        #controls button {
          font-size: 11px;
          padding: 8px 9px;
        }
        #scanner {
          bottom: 196px;
          left: 12px;
          right: 12px;
          transform: none;
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="hud"></div>
    <div id="controls"></div>
    <div id="timeline"></div>
    <div id="scanner"></div>
    <div id="tooltip"></div>
    <div id="landing"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
